name: cannonbutchery_tracker
description: "Cannon Butchery personal management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # Charts
  fl_chart: ^0.69.0

  # Formatting & utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # UI
  google_fonts: ^6.2.1

  # Export
  share_plus: ^10.1.2
  path_provider: ^2.1.4

  # State
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"
